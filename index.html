<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#020617;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
radial-gradient(circle at top left,#00eaff22,transparent 30%),
radial-gradient(circle at bottom right,#7c3aed22,transparent 30%),
linear-gradient(135deg,#020617,#071429,#0b1d34);
color:#fff;
z-index:99999;
transition:1s ease;
}

/* GRID */
.grid{
position:absolute;
inset:0;
background:
linear-gradient(#00ffff10 1px,transparent 1px),
linear-gradient(90deg,#00ffff10 1px,transparent 1px);
background-size:40px 40px;
transform:perspective(800px) rotateX(70deg) scale(1.8);
animation:gridMove 10s linear infinite;
opacity:.4;
}

@keyframes gridMove{
100%{background-position:0 40px,40px 0;}
}

/* PARTICLE */
.particle{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:#00ffff;
box-shadow:0 0 12px #00ffff;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-20vh);}
}

/* PROFILE */
.profile-wrap{
width:150px;
height:150px;
border-radius:50%;
padding:5px;
background:linear-gradient(45deg,#00ffff,#8b5cf6,#22c55e);
background-size:300% 300%;
animation:borderGlow 4s linear infinite;
box-shadow:0 0 25px #00ffff88;
position:relative;
z-index:10;
}

@keyframes borderGlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.profile{
width:100%;
height:100%;
border-radius:50%;
overflow:hidden;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
animation:zoom 4s ease-in-out infinite;
}

@keyframes zoom{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

/* ORBIT */
.orbit{
position:absolute;
width:190px;
height:190px;
border:1px dashed #00ffff55;
border-radius:50%;
animation:spin 8s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* CORE BUTTON */
.core{
margin-top:20px;
width:85px;
height:85px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,.06);
backdrop-filter:blur(12px);
box-shadow:0 0 25px #00ffff66;
animation:pulse 2s infinite;
cursor:pointer;
}

.core i{
font-size:38px;
color:#00ffff;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

/* TEXT */
h1{
margin-top:20px;
font-size:34px;
text-shadow:0 0 15px #00ffff;
}

.sub{
margin-top:8px;
font-size:14px;
letter-spacing:4px;
color:#d6faff;
}

/* PROGRESS */
.progress-wrap{
margin-top:24px;
width:360px;
max-width:90%;
height:12px;
background:#ffffff12;
border-radius:40px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffff,#22c55e,#8b5cf6);
animation:load 6s linear forwards;
}

@keyframes load{
100%{width:100%;}
}

/* STATUS */
.row{
margin-top:12px;
display:flex;
gap:18px;
}

.percent{
font-size:20px;
color:#00ffff;
font-weight:bold;
}

/* STATS */
.stats{
margin-top:22px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.card{
padding:12px 16px;
border-radius:16px;
background:rgba(255,255,255,.06);
min-width:120px;
text-align:center;
}

.card b{
display:block;
font-size:18px;
color:#00ffff;
}
</style>
</head>

<body>

<div id="loader">

<div class="grid"></div>

<div class="particle" style="left:10%"></div>
<div class="particle" style="left:30%"></div>
<div class="particle" style="left:50%"></div>
<div class="particle" style="left:70%"></div>

<div class="orbit"></div>

<div class="profile-wrap">
<div class="profile">
<img src="assets/images/roys/Profile-roys.png" alt="Roys Wanimbo">
</div>
</div>

<div class="core" onclick="boostLoad()">
<i class="fas fa-microchip"></i>
</div>

<h1>HELLO 👏 ROYS WANIMBO</h1>
<div class="sub">Interactive Smart System</div>

<div class="progress-wrap">
<div class="progress"></div>
</div>

<div class="row">
<div class="percent" id="percent">0%</div>
<div id="status">Menyiapkan Sistem...</div>
</div>

<div class="stats">
<div class="card"><b id="cpu">12%</b>CPU</div>
<div class="card"><b id="ram">34%</b>RAM</div>
<div class="card"><b id="net">21ms</b>NET</div>
</div>

</div>

<script>
let p = 0;
let done = false;

function updateStats(){
document.getElementById("cpu").innerText = Math.floor(Math.random()*70+10)+"%";
document.getElementById("ram").innerText = Math.floor(Math.random()*60+20)+"%";
document.getElementById("net").innerText = Math.floor(Math.random()*40+10)+"ms";
}

function loop(){
let t = setInterval(()=>{
p++;
document.getElementById("percent").innerText = p+"%";
updateStats();

if(p>=100){
clearInterval(t);
setTimeout(()=>{
document.getElementById("loader").style.opacity="0";
setTimeout(()=>{
window.location.href="index1.html";
},1000);
},500);
}
},60);
}

function boostLoad(){
if(p<90){
p+=10;
document.getElementById("status").innerText="BOOST MODE ⚡";
}
}

loop();
</script>

</body>
</html>

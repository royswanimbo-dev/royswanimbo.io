<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roys Loader Website</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#020617;
}

/* ======================
   LOADER FULL SCREEN
====================== */
#loader{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
radial-gradient(circle at top left,#00eaff22 0%,transparent 30%),
radial-gradient(circle at bottom right,#7c3aed22 0%,transparent 30%),
linear-gradient(135deg,#020617,#071429,#0b1d34,#08111f);
color:#fff;
z-index:99999;
overflow:hidden;
transition:1s ease;
}

/* grid */
.grid{
position:absolute;
inset:0;
background:
linear-gradient(#00ffff10 1px,transparent 1px),
linear-gradient(90deg,#00ffff10 1px,transparent 1px);
background-size:40px 40px;
transform:perspective(800px) rotateX(70deg) scale(1.8);
transform-origin:bottom;
animation:gridMove 10s linear infinite;
opacity:.4;
}

@keyframes gridMove{
100%{background-position:0 40px,40px 0;}
}

/* particles */
.particle{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:#00ffff;
box-shadow:0 0 12px #00ffff;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-20vh);}
}

/* profile image */
.profile-wrap{
position:relative;
width:150px;
height:150px;
border-radius:50%;
padding:5px;
background:linear-gradient(45deg,#00ffff,#8b5cf6,#22c55e,#00ffff);
background-size:300% 300%;
animation:borderGlow 4s linear infinite;
box-shadow:0 0 25px #00ffff88;
z-index:10;
}

@keyframes borderGlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.profile{
width:100%;
height:100%;
border-radius:50%;
overflow:hidden;
border:4px solid rgba(255,255,255,.08);
background:#111827;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
animation:zoomPhoto 4s ease-in-out infinite;
}

@keyframes zoomPhoto{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

/* orbit ring */
.orbit{
position:absolute;
width:190px;
height:190px;
border:1px dashed #00ffff55;
border-radius:50%;
animation:spin 8s linear infinite;
z-index:2;
}

.orbit::before{
content:"";
position:absolute;
top:-6px;
left:50%;
transform:translateX(-50%);
width:12px;
height:12px;
border-radius:50%;
background:#00ffff;
box-shadow:0 0 12px #00ffff;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* core icon */
.core{
margin-top:20px;
width:85px;
height:85px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,.06);
backdrop-filter:blur(12px);
box-shadow:0 0 25px #00ffff66;
animation:pulse 2s infinite;
cursor:pointer;
z-index:10;
}

.core i{
font-size:38px;
color:#00ffff;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

/* text */
h1{
margin-top:20px;
font-size:34px;
letter-spacing:2px;
text-shadow:0 0 15px #00ffff;
z-index:10;
}

.sub{
margin-top:8px;
font-size:14px;
letter-spacing:4px;
text-transform:uppercase;
color:#d6faff;
z-index:10;
}

/* progress */
.progress-wrap{
margin-top:24px;
width:360px;
max-width:90%;
height:12px;
background:#ffffff12;
border-radius:40px;
overflow:hidden;
z-index:10;
}

.progress{
height:100%;
width:0%;
border-radius:40px;
background:linear-gradient(90deg,#00ffff,#22c55e,#8b5cf6);
animation:load 6s linear forwards;
}

@keyframes load{
100%{width:100%;}
}

.row{
margin-top:12px;
display:flex;
gap:18px;
z-index:10;
}

.percent{
font-size:20px;
font-weight:bold;
color:#00ffff;
}

.status{
font-size:14px;
color:#e8f6ff;
}

/* cards */
.stats{
margin-top:22px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
z-index:10;
}

.card{
padding:12px 16px;
border-radius:16px;
background:rgba(255,255,255,.06);
min-width:120px;
text-align:center;
}

.card b{
display:block;
font-size:18px;
color:#00ffff;
margin-bottom:5px;
}

/* mobile */
@media(max-width:768px){
.profile-wrap{width:120px;height:120px;}
.orbit{width:155px;height:155px;}
h1{font-size:24px;}
.progress-wrap{width:280px;}
.row{flex-direction:column;gap:5px;}
}
</style>
</head>
<body>

<div id="loader">

<div class="grid"></div>

<div class="particle" style="left:10%;animation-duration:8s;"></div>
<div class="particle" style="left:22%;animation-duration:10s;"></div>
<div class="particle" style="left:40%;animation-duration:7s;"></div>
<div class="particle" style="left:60%;animation-duration:9s;"></div>
<div class="particle" style="left:82%;animation-duration:6s;"></div>

<!-- FOTO PROFIL -->
<div class="orbit"></div>

<div class="profile-wrap">
<div class="profile">
<img src="assets/images/roys/Profile-roys.png" alt="Roys Wanimbo">
</div>
</div>

<div class="core" onclick="boostLoad()">
<i class="fas fa-microchip"></i>
</div>

<h1>HELLO 👏  ROYS WANIMBO</h1>
<div class="sub">Interactive Smart System</div>

<div class="progress-wrap">
<div class="progress"></div>
</div>

<div class="row">
<div class="percent" id="percent">0%</div>
<div class="status" id="status">Menyiapkan Sistem...</div>
</div>

<div class="stats">
<div class="card"><b id="cpu">12%</b>CPU</div>
<div class="card"><b id="ram">34%</b>RAM</div>
<div class="card"><b id="net">21ms</b>NETWORK</div>
</div>

</div>

<script>
let p = 0;
let done = false;

const percent = document.getElementById("percent");
const statusText = document.getElementById("status");
const cpu = document.getElementById("cpu");
const ram = document.getElementById("ram");
const net = document.getElementById("net");

const msgs = [
"Menyiapkan Sistem...",
"Menyambungkan Jaringan...",
"Memuat Interface...",
"Mengaktifkan Security...",
"Mengoptimalkan Data...",
"Hampir Selesai..."
];

function randomStats(){
cpu.innerHTML = Math.floor(Math.random()*70+10)+"%";
ram.innerHTML = Math.floor(Math.random()*60+20)+"%";
net.innerHTML = Math.floor(Math.random()*40+10)+"ms";
}

function loop(){
let timer = setInterval(()=>{
p++;
percent.innerHTML = p + "%";
randomStats();

if(p<20) statusText.innerHTML = msgs[0];
else if(p<40) statusText.innerHTML = msgs[1];
else if(p<60) statusText.innerHTML = msgs[2];
else if(p<80) statusText.innerHTML = msgs[3];
else if(p<95) statusText.innerHTML = msgs[4];
else statusText.innerHTML = msgs[5];

if(p>=100){
clearInterval(timer);
finish();
}
},60);
}

function boostLoad(){
if(p<85){
p += 10;
statusText.innerHTML = "Boost Mode Activated ⚡";
}
}

function finish(){
if(done) return;
done = true;

setTimeout(()=>{
document.getElementById("loader").style.opacity="0";

setTimeout(()=>{
window.location.href="index1.html";
},1000);

},700);
}

loop();
</script>

</body>
</html>
